<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- W mark — centered, clean geometric crown -->
  <path d="M126 145 L196 290 L256 195 L316 290 L386 145"
        stroke="#3B82F6" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="256" cy="130" r="14" fill="#3B82F6"/>

  <!-- Wordmark — positioned well below the W with clear breathing room -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" letter-spacing="-1.5">
    <tspan fill="#ffffff" font-weight="700">with</tspan><tspan fill="#93C5FD" font-weight="500">lukas</tspan>
  </text>
</svg>
